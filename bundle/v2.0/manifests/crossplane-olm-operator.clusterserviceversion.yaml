apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "crossplane.crossplane.io/v1alpha1",
          "kind": "CrossplaneConfig",
          "metadata": {
            "name": "crossplane"
          },
          "spec": {
            "version": "v2.0"
          }
        }
      ]
    capabilities: Full Lifecycle
    categories: Integration & Delivery
    containerImage: ghcr.io/gurnben-agent/crossplane-olm-operator:v2.0.0
    createdAt: "2026-01-01T00:00:00Z"
    description: Manages Crossplane v2.0 installations on OpenShift via OLM
    operators.operatorframework.io/builder: operator-sdk-v1.39.1
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    support: Community
  name: crossplane-olm-operator.v2.0.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Declarative configuration for a Crossplane installation
      displayName: CrossplaneConfig
      kind: CrossplaneConfig
      name: crossplaneconfigs.crossplane.crossplane.io
      version: v1alpha1
      statusDescriptors:
      - description: The observed Crossplane version
        displayName: Observed Version
        path: observedVersion
        x-descriptors:
        - urn:alm:descriptor:text
      - description: Current status conditions
        displayName: Conditions
        path: conditions
        x-descriptors:
        - urn:alm:descriptor:io.kubernetes.conditions
      specDescriptors:
      - description: Crossplane version to install
        displayName: Version
        path: version
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:text
  description: |
    The Crossplane OLM Operator provides OpenShift-native lifecycle management
    for Crossplane v2.0. It installs and manages Crossplane through a declarative
    CrossplaneConfig custom resource, exposing common tuning knobs without
    requiring Helm expertise.

    ### Features
    - Declarative Crossplane installation via CrossplaneConfig CR
    - Managed Resource Activation Policy (MRAP) for CRD filtering
    - Package and function cache configuration
    - Feature flag management across Crossplane versions
    - Automatic Z-stream patch upgrades within a channel
    - Air-gapped support via embedded Helm charts
  displayName: Crossplane OLM Operator
  icon:
  - base64data: ""
    mediatype: image/png
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups:
          - ""
          resources:
          - configmaps
          - persistentvolumeclaims
          - secrets
          - serviceaccounts
          - services
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - ""
          resources:
          - events
          verbs:
          - create
          - patch
        - apiGroups:
          - ""
          resources:
          - namespaces
          verbs:
          - create
          - get
          - list
          - watch
        - apiGroups:
          - admissionregistration.k8s.io
          resources:
          - mutatingwebhookconfigurations
          - validatingwebhookconfigurations
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - apiextensions.k8s.io
          resources:
          - customresourcedefinitions
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - apps
          resources:
          - deployments
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - coordination.k8s.io
          resources:
          - leases
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - crossplane.crossplane.io
          resources:
          - crossplaneconfigs
          verbs:
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - crossplane.crossplane.io
          resources:
          - crossplaneconfigs/finalizers
          verbs:
          - update
        - apiGroups:
          - crossplane.crossplane.io
          resources:
          - crossplaneconfigs/status
          verbs:
          - get
          - patch
          - update
        - apiGroups:
          - rbac.authorization.k8s.io
          resources:
          - clusterrolebindings
          - clusterroles
          - rolebindings
          - roles
          verbs:
          - create
          - delete
          - get
          - list
          - patch
          - update
          - watch
        serviceAccountName: crossplane-olm-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/name: crossplane-olm-operator
          app.kubernetes.io/component: manager
          control-plane: controller-manager
        name: crossplane-olm-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          template:
            metadata:
              labels:
                control-plane: controller-manager
            spec:
              containers:
              - name: manager
                image: ghcr.io/gurnben-agent/crossplane-olm-operator:v2.0.0
                command:
                - /manager
                args:
                - --leader-elect
                - --health-probe-bind-address=:8081
                env:
                - name: WATCH_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.annotations['olm.targetNamespaces']
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 256Mi
                  requests:
                    cpu: 100m
                    memory: 128Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
              securityContext:
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
              serviceAccountName: crossplane-olm-operator-controller-manager
              terminationGracePeriodSeconds: 10
    strategy: deployment
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: false
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - crossplane
  - kubernetes
  - openshift
  - infrastructure
  - multicloud
  links:
  - name: Crossplane
    url: https://crossplane.io
  - name: Documentation
    url: https://docs.crossplane.io
  maintainers:
  - email: gurnben-agent@users.noreply.github.com
    name: Crossplane OLM Operator Maintainers
  maturity: alpha
  minKubeVersion: "1.28.0"
  provider:
    name: Community
  version: 2.0.0
  # TODO: Phase 3 — Finalize relatedImages from Helm chart rendering output
  relatedImages: []
