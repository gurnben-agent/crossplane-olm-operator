---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-crossplane-crossplane-io-v1alpha1-crossplaneconfig
  failurePolicy: Ignore
  name: vcrossplaneconfig.kb.io
  rules:
  - apiGroups:
    - crossplane.crossplane.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    resources:
    - crossplaneconfigs
  sideEffects: None
