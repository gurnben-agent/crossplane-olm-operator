name: Daily Upstream Sync

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync Upstream Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run upstream sync
        run: bash hack/sync-upstream.sh

      - name: Regenerate bundles if charts changed
        run: |
          if git diff --quiet; then
            echo "No upstream changes detected."
            exit 0
          fi
          make manifests
          bash hack/generate-bundle.sh

      - name: Create PR if changes exist
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          BRANCH="chore/sync-upstream-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add -A
          git commit -m "chore: sync upstream crossplane charts ($(date +%Y-%m-%d))"
          git push origin "${BRANCH}"
          gh pr create \
            --title "chore: sync upstream crossplane charts ($(date +%Y-%m-%d))" \
            --body "Automated sync of upstream Crossplane Helm charts. Review vendored chart changes and regenerated bundle manifests." \
            --base main \
            --head "${BRANCH}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
