name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: gurnben-agent

jobs:
  operator-image:
    name: Build & Push Operator Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/setup-qemu-action@v3

      - name: Build and push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/crossplane-olm-operator:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/crossplane-olm-operator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bundle-images:
    name: Build & Push Bundle Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [v2.0, v2.1, v2.2]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bundle image
        run: |
          BUNDLE_IMG="${REGISTRY}/${ORG}/crossplane-olm-operator-bundle:${{ matrix.version }}"
          docker build -f bundle/${{ matrix.version }}/bundle.Dockerfile -t "${BUNDLE_IMG}" bundle/${{ matrix.version }}
          docker push "${BUNDLE_IMG}"

  catalog-image:
    name: Build & Push Catalog Image
    runs-on: ubuntu-latest
    needs: [bundle-images]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install opm
        run: |
          export ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
          curl -sLo opm "https://github.com/operator-framework/operator-registry/releases/download/v1.52.0/linux-${ARCH}-opm"
          chmod +x opm
          sudo mv opm /usr/local/bin/

      - name: Validate FBC catalog
        run: opm validate catalog/

      - name: Build and push catalog image
        run: |
          CATALOG_IMG="${REGISTRY}/${ORG}/crossplane-olm-operator-catalog:${GITHUB_REF_NAME}"
          CATALOG_LATEST="${REGISTRY}/${ORG}/crossplane-olm-operator-catalog:latest"
          docker build -f catalog.Dockerfile -t "${CATALOG_IMG}" -t "${CATALOG_LATEST}" .
          docker push "${CATALOG_IMG}"
          docker push "${CATALOG_LATEST}"
