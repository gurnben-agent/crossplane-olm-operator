name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: gurnben-agent

jobs:
  operator-image:
    name: Build & Push Operator Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Placeholder: will build and push once Dockerfile is finalized
      - name: Build and push operator image
        run: |
          IMG="${REGISTRY}/${ORG}/crossplane-olm-operator:${GITHUB_REF_NAME}"
          echo "TODO: docker buildx build --platform linux/amd64,linux/arm64 --push -t ${IMG} ."
          echo "Would push: ${IMG}"

  bundle-images:
    name: Build & Push Bundle Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        version: [v2.0, v2.1, v2.2]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Placeholder: will build and push once bundle Dockerfiles exist
      - name: Build and push bundle image
        run: |
          BUNDLE_IMG="${REGISTRY}/${ORG}/crossplane-olm-operator-bundle:${{ matrix.version }}"
          echo "TODO: docker build -f bundle/${{ matrix.version }}/bundle.Dockerfile -t ${BUNDLE_IMG} bundle/${{ matrix.version }}"
          echo "Would push: ${BUNDLE_IMG}"

  catalog-image:
    name: Build & Push Catalog Image
    runs-on: ubuntu-latest
    needs: [bundle-images]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Placeholder: will build and push once catalog Dockerfile exists
      - name: Build and push catalog image
        run: |
          CATALOG_IMG="${REGISTRY}/${ORG}/crossplane-olm-operator-catalog:${GITHUB_REF_NAME}"
          echo "TODO: docker build -f catalog.Dockerfile -t ${CATALOG_IMG} ."
          echo "Would push: ${CATALOG_IMG}"
