name: Publish Catalog

on:
  push:
    branches: [main]
    paths:
      - "catalog/**"
      - "bundle/**"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: gurnben-agent

jobs:
  publish-catalog:
    name: Rebuild & Push FBC Catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install opm
        run: |
          export ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
          curl -sLo opm "https://github.com/operator-framework/operator-registry/releases/download/v1.52.0/linux-${ARCH}-opm"
          chmod +x opm
          sudo mv opm /usr/local/bin/

      - name: Validate FBC catalog
        run: opm validate catalog/

      - name: Build and push catalog image
        run: |
          CATALOG_IMG="${REGISTRY}/${ORG}/crossplane-olm-operator-catalog:latest"
          docker build -f catalog.Dockerfile -t "${CATALOG_IMG}" .
          docker push "${CATALOG_IMG}"
